<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{title}}</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>

<header class="header">
  <h1>Insight Hub</h1>
</header>

<main class="article-container">

  <h1 class="article-title">{{title}}</h1>

  <p class="meta">Published on {{date}}</p>

  <img src="{{image}}" class="cover">

  <div class="content">
    {{content}}
  </div>

</main>

<footer>
  <p>© 2026 Insight Hub</p>
</footer>

</body>
</html>
